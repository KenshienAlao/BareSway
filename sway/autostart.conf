exec systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP
exec dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP

exec_always dbus-update-activation-environment --systemd \
    WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

exec_always sh -c "pkill waybar; sleep 0.2; waybar"

input * {
    tap enabled
    natural_scroll disabled
}

# Wallpaper — start daemon, restore last wallpaper or fall back to black
exec awww-daemon
exec sh -c 'sleep 0.3; if [ -z "$(awww query 2>/dev/null | grep -v "no image")" ]; then awww clear 000000; fi'